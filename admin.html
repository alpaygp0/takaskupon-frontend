<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TakasKupon - Admin Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #f1f5f9; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #e2e8f0; }
        /* Toast Bildirim CSS'i */
        #toastContainer { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { min-width: 250px; padding: 15px 20px; border-radius: 12px; font-weight: 500; display: flex; align-items: center; gap: 10px; transform: translateX(120%); animation: slideInRight 0.4s forwards; }
        .toast.success { background: #10b981; color: white; }
        .toast.error { background: #ef4444; color: white; }
        @keyframes slideInRight { to { transform: translateX(0); } }
        .toast.fade-out { opacity: 0; transform: translateX(100%); transition: all 0.3s; }
    </style>
</head>
<body class="text-slate-800">

    <div id="toastContainer"></div>

    <nav class="glass-panel fixed w-full z-50 top-0 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-shield-halved text-red-500 text-2xl"></i>
                    <span class="font-bold text-xl tracking-tight">Admin<span class="text-red-500">Panel</span></span>
                </div>
                <div class="flex items-center gap-4">
                    <a href="index.html" class="text-slate-500 hover:text-indigo-600 font-medium transition"><i class="fa-solid fa-arrow-left"></i> Siteye Dön</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-24 pb-12">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">Bekleyen Şikayetler ⚖️</h1>
                <p class="text-slate-500 mt-1">Gelen kanıtları incele ve karara bağla.</p>
            </div>
            <button onclick="loadReports()" class="bg-white border border-slate-200 text-slate-600 px-4 py-2 rounded-lg hover:bg-slate-50 shadow-sm transition">
                <i class="fa-solid fa-rotate-right"></i> Yenile
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="reportsGrid">
            <p class="text-slate-500">Şikayetler yükleniyor...</p>
        </div>
    </main>

    <div id="imageModal" class="fixed inset-0 bg-slate-900/80 z-[100] hidden flex justify-center items-center opacity-0 transition-opacity">
        <button onclick="closeImageModal()" class="absolute top-6 right-6 text-white text-3xl"><i class="fa-solid fa-times"></i></button>
        <img id="fullProofImage" src="" class="max-w-full max-h-[90vh] rounded-lg shadow-2xl">
    </div>
    <div id="adminConfirmModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[110] hidden flex items-center justify-center opacity-0 transition-opacity duration-300 p-4">
        <div class="bg-white rounded-[2rem] max-w-sm w-full p-8 text-center shadow-2xl transform scale-95 transition-all duration-300 relative">
            <div id="adminConfirmIcon" class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center text-4xl mx-auto mb-5 border-[6px] border-white shadow-sm">
                </div>
            
            <h3 id="adminConfirmTitle" class="text-2xl font-bold text-slate-800 mb-2">Emin misiniz?</h3>
            <p id="adminConfirmDesc" class="text-sm text-slate-500 font-medium mb-8 leading-relaxed">
                </p>
            
            <div class="flex gap-3">
                <button onclick="closeAdminConfirm()" class="flex-1 bg-slate-100 text-slate-600 font-bold py-3.5 rounded-xl hover:bg-slate-200 transition-colors">Vazgeç</button>
                <button id="adminConfirmBtn" class="flex-1 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg active:scale-95">Onayla</button>
            </div>
        </div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
